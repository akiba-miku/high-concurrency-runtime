name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: ${{ matrix.compiler.name }} / ${{ matrix.build_type }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        build_type: [Debug, Release]
        compiler:
          - { name: gcc-12, cc: gcc-12, cxx: g++-12, pkgs: g++-12 }
          - { name: clang,  cc: clang,  cxx: clang++, pkgs: clang }

    env:
      CC: ${{ matrix.compiler.cc }}
      CXX: ${{ matrix.compiler.cxx }}
    steps:
      - uses: actions/checkout@v4

      - name: Install toolchain & deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake ninja-build libgtest-dev ${{ matrix.compiler.pkgs }}

      - name: Configure
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}

      - name: Build
        run: cmake --build build -j"$(nproc)"

      - name: Test
        run: ctest --test-dir build --output-on-failure

  sanitizers:
    name: ${{ matrix.san.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        san:
          - name: asan-ubsan
            flags: "-fsanitize=address,undefined -fno-sanitize-recover=all -fno-omit-frame-pointer -g"
    env:
      CC: clang
      CXX: clang++
    steps:
      - uses: actions/checkout@v4

      - name: Install toolchain & deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake ninja-build libgtest-dev clang

      - name: Configure
        run: >
          cmake -B build -G Ninja
          -DCMAKE_BUILD_TYPE=RelWithDebInfo
          -DCMAKE_CXX_FLAGS="${{ matrix.san.flags }}"
          -DCMAKE_EXE_LINKER_FLAGS="${{ matrix.san.flags }}"

      - name: Build
        run: cmake --build build -j"$(nproc)"
