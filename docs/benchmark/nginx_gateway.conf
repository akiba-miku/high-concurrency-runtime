# docs/benchmark/nginx_gateway.conf
# Nginx acting as the comparison reverse-proxy gateway on :8088.
# Proxies round-robin to the same 9001-9004 upstreams used by the runtime
# gateway, with a keepalive pool sized to match the runtime gateway's
# max_idle_per_peer = 64.
#
#   nginx -t -c "$PWD/docs/benchmark/nginx_gateway.conf"
#   nginx    -c "$PWD/docs/benchmark/nginx_gateway.conf"
#   nginx -s stop -c "$PWD/docs/benchmark/nginx_gateway.conf"

worker_processes 4;
worker_rlimit_nofile 200000;
error_log /dev/null crit;
pid /tmp/nginx_gateway.pid;

events {
    worker_connections 65535;
    use epoll;
    multi_accept on;
}

http {
    access_log off;
    keepalive_timeout 65;
    keepalive_requests 1000000;

    # Run rootless: keep all runtime temp dirs under /tmp.
    client_body_temp_path /tmp/nginx_gateway_tmp/client;
    proxy_temp_path       /tmp/nginx_gateway_tmp/proxy;
    fastcgi_temp_path     /tmp/nginx_gateway_tmp/fastcgi;
    uwsgi_temp_path       /tmp/nginx_gateway_tmp/uwsgi;
    scgi_temp_path        /tmp/nginx_gateway_tmp/scgi;

    upstream backend {
        server 127.0.0.1:9001;
        server 127.0.0.1:9002;
        server 127.0.0.1:9003;
        server 127.0.0.1:9004;
        keepalive 64;
    }

    server {
        listen 8088 reuseport;

        location / {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }
    }
}
