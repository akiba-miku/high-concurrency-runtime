# docs/benchmark/nginx_upstream.conf
# Shared upstream backends for the C10k benchmark.
# Four virtual servers on 9001-9004, each returns a fixed ~512B JSON body so
# that BOTH the runtime gateway (8080) and the nginx gateway (8088) proxy to the
# exact same origin. The body length is 512 bytes (Content-Length: 512).
#
#   nginx -t -c "$PWD/docs/benchmark/nginx_upstream.conf"
#   nginx    -c "$PWD/docs/benchmark/nginx_upstream.conf"
#   nginx -s stop -c "$PWD/docs/benchmark/nginx_upstream.conf"

worker_processes 4;
worker_rlimit_nofile 200000;
error_log /dev/null crit;
pid /tmp/nginx_upstream.pid;

events {
    worker_connections 65535;
    use epoll;
    multi_accept on;
}

http {
    access_log off;
    keepalive_timeout 65;
    keepalive_requests 1000000;
    default_type application/json;

    # Run rootless: keep all runtime temp dirs under /tmp.
    client_body_temp_path /tmp/nginx_upstream_tmp/client;
    proxy_temp_path       /tmp/nginx_upstream_tmp/proxy;
    fastcgi_temp_path     /tmp/nginx_upstream_tmp/fastcgi;
    uwsgi_temp_path       /tmp/nginx_upstream_tmp/uwsgi;
    scgi_temp_path        /tmp/nginx_upstream_tmp/scgi;

    # 512-byte JSON payload (payload filler = 429 'x').
    map $host $bench_body {
        default '{"service":"upstream-bench","status":"ok","code":200,"id":"127.0.0.1","payload":""}';
    }

    server { listen 9001 reuseport backlog=65535; location / { return 200 $bench_body; } }
    server { listen 9002 reuseport backlog=65535; location / { return 200 $bench_body; } }
    server { listen 9003 reuseport backlog=65535; location / { return 200 $bench_body; } }
    server { listen 9004 reuseport backlog=65535; location / { return 200 $bench_body; } }
}
